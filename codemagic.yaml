workflows:
  android-debug-apk:
    name: Android Debug APK
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      vars:
        API_BASE_URL: "https://backend-dialysis-record-system-spring.onrender.com"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze project
        script: flutter analyze
      - name: Build debug APK
        script: flutter build apk --debug --dart-define=API_BASE_URL=$API_BASE_URL
    artifacts:
      - build/app/outputs/flutter-apk/app-debug.apk

  android-release-aab:
    name: Android Release AAB
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
      android_signing:
        - dialysis_record_keystore
      vars:
        API_BASE_URL: "https://backend-dialysis-record-system-spring.onrender.com"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze project
        script: flutter analyze
      - name: Build release app bundle
        script: flutter build appbundle --release --dart-define=API_BASE_URL=$API_BASE_URL
    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/app/outputs/flutter-apk/app-release.apk

  web-release:
    name: Web Release
    max_build_duration: 60
    environment:
      flutter: stable
      vars:
        API_BASE_URL: "https://backend-dialysis-record-system-spring.onrender.com"
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Analyze project
        script: flutter analyze
      - name: Build web app
        script: flutter build web --release --dart-define=API_BASE_URL=$API_BASE_URL
    artifacts:
      - build/web/**
